name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            docker:
              - 'Dockerfile'
              - 'server/**'

  server-lint:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check app/ tests/
      - run: uv run ruff format --check app/ tests/

  server-test:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --frozen --all-groups
      - run: uv run pytest --cov=app tests/

  docker-build:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t sentifish-ci .

  ci-pass:
    needs: [server-lint, server-test, docker-build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Decide
        run: |
          echo "server-lint: ${{ needs.server-lint.result }}"
          echo "server-test: ${{ needs.server-test.result }}"
          echo "docker-build: ${{ needs.docker-build.result }}"
          if [[ "${{ needs.server-lint.result }}" =~ ^(success|skipped)$ ]] && \
             [[ "${{ needs.server-test.result }}" =~ ^(success|skipped)$ ]] && \
             [[ "${{ needs.docker-build.result }}" =~ ^(success|skipped)$ ]]; then
            echo "All checks passed or were skipped"
          else
            echo "Some checks failed"
            exit 1
          fi
